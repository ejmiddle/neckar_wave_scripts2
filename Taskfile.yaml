version: '3'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # Main Streamlit app
  main_run:
    desc: Run the main Streamlit app on port 8080
    cmds:
      - task: _streamlit_app
        vars:
          APP_ENTRYPOINT: apps/main.py
          APP_PORT: '8080'
    interactive: true

  main_docker_build:
    desc: Build the main Streamlit app image for GHCR
    cmds:
      - task: _docker_build_streamlit_app
        vars:
          APP_ENTRYPOINT: apps/main.py
          IMAGE: ghcr.io/ejmiddle/neckarwave-scripts-main

  main_docker_push:
    desc: Push the main Streamlit app image and build cache to GHCR
    cmds:
      - task: _docker_push_streamlit_app
        vars:
          IMAGE: ghcr.io/ejmiddle/neckarwave-scripts-main

  main_docker_publish:
    desc: Build, push, and deploy the main Streamlit app to Mittwald
    cmds:
      - task: main_docker_build
      - task: main_docker_push
      - task: main_mittwald_deploy

  main_mittwald_deploy:
    desc: Sync main app env vars and pull/recreate the main image in Mittwald
    deps: [dev_install]
    cmds:
      - sh -c 'if [ -f .env ]; then set -a; . ./.env; set +a; fi; UV_CACHE_DIR=.uv-cache uv run python scripts/deploy_mittwald_service.py sync-secrets --project suedseite --service "${MAIN_MITTWALD_SERVICE:-testcontainer}" --env-file config/secrets/production.enc.env --env-keys-file config/deploy/main.env.keys --recreate'
      - sh -c 'if [ -f .env ]; then set -a; . ./.env; set +a; fi; UV_CACHE_DIR=.uv-cache uv run python scripts/deploy_mittwald_service.py publish --project suedseite --service "${MAIN_MITTWALD_SERVICE:-testcontainer}" --image ghcr.io/ejmiddle/neckarwave-scripts-main:latest --env-file config/secrets/production.enc.env --env-keys-file config/deploy/main.env.keys'

  main_docker_run:
    desc: Run the main app container locally on port 8080 with live source mounts
    cmds:
      - task: main_docker_build
      - docker run --rm --platform linux/amd64 --env-file .env -e STREAMLIT_APP_FILE=apps/main.py -e STREAMLIT_SERVER_PORT=8080 -p 8080:8080 -v "$(pwd)/apps:/app/apps" -v "$(pwd)/data:/app/data" -v "$(pwd)/src:/app/src" -v "$(pwd)/pages:/app/pages" -v "$(pwd)/streamlit_app.py:/app/streamlit_app.py:ro" -v "$(pwd)/.streamlit:/app/.streamlit:ro" -v "$(pwd)/logging.conf:/app/logging.conf:ro" ghcr.io/ejmiddle/neckarwave-scripts-main:latest
    interactive: true

  # Accounting Streamlit app
  acc_run:
    desc: Run the accounting Streamlit app on port 8081
    cmds:
      - task: _streamlit_app
        vars:
          APP_ENTRYPOINT: apps/accounting.py
          APP_PORT: '8081'
    interactive: true

  acc_docker_build:
    desc: Build the accounting Streamlit app image for GHCR
    cmds:
      - task: _docker_build_streamlit_app
        vars:
          APP_ENTRYPOINT: apps/accounting.py
          IMAGE: ghcr.io/ejmiddle/neckarwave-scripts-accounting

  acc_docker_push:
    desc: Push the accounting Streamlit app image and build cache to GHCR
    cmds:
      - task: _docker_push_streamlit_app
        vars:
          IMAGE: ghcr.io/ejmiddle/neckarwave-scripts-accounting

  acc_auth_proxy_hash_password:
    desc: Hash ACCOUNTING_AUTH_PASSWORD for the accounting auth proxy
    cmds:
      - sh -c 'if [ -z "$ACCOUNTING_AUTH_PASSWORD" ]; then echo "Set ACCOUNTING_AUTH_PASSWORD first."; exit 1; fi; docker run --rm caddy:2 caddy hash-password --plaintext "$ACCOUNTING_AUTH_PASSWORD"'

  acc_auth_proxy_docker_build:
    desc: Build the accounting auth proxy image for GHCR
    cmds:
      - sh -c 'if [ -f .env ]; then . ./.env; fi; PULL_FLAG=""; if [ "${DOCKER_BUILD_PULL:-1}" = "1" ]; then PULL_FLAG="--pull"; fi; BASE_IMAGE="${CADDY_BASE_IMAGE:-caddy:2}"; echo "Using BASE_IMAGE=${BASE_IMAGE}"; if [ -z "${PULL_FLAG}" ] && ! docker image inspect "${BASE_IMAGE}" >/dev/null 2>&1; then echo "Local image ${BASE_IMAGE} not found and DOCKER_BUILD_PULL=0; set DOCKER_BUILD_PULL=1 or provide a local/base mirror."; exit 1; fi; docker buildx build --platform linux/amd64 ${PULL_FLAG} --build-arg BASE_IMAGE="${BASE_IMAGE}" -t ghcr.io/ejmiddle/neckarwave-scripts-accounting-auth-proxy:latest --load -f Dockerfile.accounting-auth-proxy .'

  acc_auth_proxy_docker_push:
    desc: Push the accounting auth proxy image to GHCR
    cmds:
      - docker push ghcr.io/ejmiddle/neckarwave-scripts-accounting-auth-proxy:latest
      - echo 'Tip-> source .env && echo "$GHCR_TOKEN" | docker login ghcr.io -u ejmiddle --password-stdin'

  acc_auth_proxy_docker_publish:
    desc: Build, push, and deploy the accounting auth proxy to Mittwald
    cmds:
      - task: acc_auth_proxy_docker_build
      - task: acc_auth_proxy_docker_push
      - task: acc_auth_proxy_mittwald_deploy

  acc_docker_publish:
    desc: Build, push, and deploy the accounting Streamlit app to Mittwald
    cmds:
      - task: acc_docker_build
      - task: acc_docker_push
      - task: acc_mittwald_deploy

  acc_mittwald_deploy:
    desc: Sync accounting env vars and pull/recreate the accounting image in Mittwald
    deps: [dev_install]
    cmds:
      - sh -c 'if [ -f .env ]; then set -a; . ./.env; set +a; fi; UV_CACHE_DIR=.uv-cache uv run python scripts/deploy_mittwald_service.py sync-secrets --project suedseite --service accounting --env-file config/secrets/production.enc.env --env-keys-file config/deploy/accounting.env.keys --recreate'
      - sh -c 'if [ -f .env ]; then set -a; . ./.env; set +a; fi; UV_CACHE_DIR=.uv-cache uv run python scripts/deploy_mittwald_service.py publish --project suedseite --service accounting --image ghcr.io/ejmiddle/neckarwave-scripts-accounting:latest --env-file config/secrets/production.enc.env --env-keys-file config/deploy/accounting.env.keys'

  acc_auth_proxy_mittwald_deploy:
    desc: Sync accounting auth proxy env vars and deploy the proxy image to Mittwald
    deps: [dev_install]
    cmds:
      - sh -c 'if [ -f .env ]; then set -a; . ./.env; set +a; fi; UV_CACHE_DIR=.uv-cache uv run python scripts/deploy_mittwald_service.py sync-secrets --project suedseite --service accounting-auth-proxy --env-file config/secrets/production.enc.env --env-keys-file config/deploy/accounting-auth-proxy.env.keys --recreate'
      - sh -c 'if [ -f .env ]; then set -a; . ./.env; set +a; fi; UV_CACHE_DIR=.uv-cache uv run python scripts/deploy_mittwald_service.py publish --project suedseite --service accounting-auth-proxy --image ghcr.io/ejmiddle/neckarwave-scripts-accounting-auth-proxy:latest --env-file config/secrets/production.enc.env --env-keys-file config/deploy/accounting-auth-proxy.env.keys'

  acc_docker_run:
    desc: Run the accounting app container locally on port 8081 with live source mounts
    cmds:
      - task: acc_docker_build
      - docker run --rm --platform linux/amd64 --env-file .env -e STREAMLIT_APP_FILE=apps/accounting.py -e STREAMLIT_SERVER_PORT=8080 -p 8081:8080 -v "$(pwd)/apps:/app/apps" -v "$(pwd)/data:/app/data" -v "$(pwd)/src:/app/src" -v "$(pwd)/pages:/app/pages" -v "$(pwd)/streamlit_app.py:/app/streamlit_app.py:ro" -v "$(pwd)/.streamlit:/app/.streamlit:ro" -v "$(pwd)/logging.conf:/app/logging.conf:ro" ghcr.io/ejmiddle/neckarwave-scripts-accounting:latest
    interactive: true

  # Dev and utility tasks
  dev_install:
    desc: Install dependencies using uv
    cmds:
      - UV_CACHE_DIR=.uv-cache uv sync
    sources:
      - pyproject.toml
      - uv.lock

  _streamlit_app:
    internal: true
    deps: [dev_install]
    cmds:
      - sh -c 'if [ -f .env ]; then set -a; . ./.env; set +a; fi; UV_CACHE_DIR=.uv-cache uv run streamlit run {{.APP_ENTRYPOINT}} --server.port {{.APP_PORT}} --browser.serverPort {{.APP_PORT}}'

  dev_ping_test_internet:
    desc: Run the internet ping test script
    deps: [dev_install]
    cmds:
      - UV_CACHE_DIR=.uv-cache uv run python scripts/ping_test_internet.py monitor

  dev_ping_test_internet_plot:
    desc: Plot results from the internet ping test logfile
    deps: [dev_install]
    cmds:
      - UV_CACHE_DIR=.uv-cache uv run python scripts/ping_test_internet.py plot

  dev_mittwald_suedseite_containers_status:
    desc: Check Mittwald container/service status for project suedseite
    deps: [dev_install]
    cmds:
      - sh -c 'if [ -f .env ]; then set -a; . ./.env; set +a; fi; UV_CACHE_DIR=.uv-cache uv run python scripts/check_mittwald_project_containers.py --project suedseite --fail-on-non-running'

  dev_mittwald_suedseite_containers_logs:
    desc: Check Mittwald container/service status for project suedseite and show recent logs for unhealthy services
    deps: [dev_install]
    cmds:
      - sh -c 'if [ -f .env ]; then set -a; . ./.env; set +a; fi; UV_CACHE_DIR=.uv-cache uv run python scripts/check_mittwald_project_containers.py --project suedseite --fail-on-non-running --show-logs --log-tail 120'

  dev_mittwald_suedseite_containers_unhealthy:
    desc: Show only unhealthy Mittwald containers/services for project suedseite and their recent logs
    deps: [dev_install]
    cmds:
      - sh -c 'if [ -f .env ]; then set -a; . ./.env; set +a; fi; UV_CACHE_DIR=.uv-cache uv run python scripts/check_mittwald_project_containers.py --project suedseite --only-unhealthy --fail-on-non-running --show-logs --log-tail 120'

  dev_clean:
    desc: Clear local uv, Streamlit, and Python caches
    cmds:
      - rm -rf .uv-cache .streamlit/cache .pytest_cache .mypy_cache
      - find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true

  _docker_build_streamlit_app:
    internal: true
    cmds:
      - sh -c 'if [ -f .env ]; then . ./.env; fi; PULL_FLAG=""; if [ "${DOCKER_BUILD_PULL:-1}" = "1" ]; then PULL_FLAG="--pull"; fi; BASE_IMAGE="${BASE_IMAGE:-python:3.12-slim}"; echo "Using BASE_IMAGE=${BASE_IMAGE}"; if [ -z "${PULL_FLAG}" ] && ! docker image inspect "${BASE_IMAGE}" >/dev/null 2>&1; then echo "Local image ${BASE_IMAGE} not found and DOCKER_BUILD_PULL=0; set DOCKER_BUILD_PULL=1 or provide a local/base mirror."; exit 1; fi; if [ "${DOCKER_BUILD_REGISTRY_CACHE:-0}" = "1" ]; then docker buildx build --platform linux/amd64 ${PULL_FLAG} --build-arg BASE_IMAGE="${BASE_IMAGE}" --build-arg STREAMLIT_APP_FILE={{.APP_ENTRYPOINT}} --cache-from type=registry,ref={{.IMAGE}}:buildcache --cache-to type=registry,ref={{.IMAGE}}:buildcache,mode=max -t {{.IMAGE}}:latest --load -f Dockerfile .; else docker buildx build --platform linux/amd64 ${PULL_FLAG} --build-arg BASE_IMAGE="${BASE_IMAGE}" --build-arg STREAMLIT_APP_FILE={{.APP_ENTRYPOINT}} -t {{.IMAGE}}:latest --load -f Dockerfile .; fi'
      - echo "docker images {{.IMAGE}}:latest"

  _docker_push_streamlit_app:
    internal: true
    cmds:
      - docker push {{.IMAGE}}:latest
      - sh -c 'if [ "${DOCKER_BUILD_REGISTRY_CACHE:-0}" = "1" ]; then docker push {{.IMAGE}}:buildcache; fi'
      - echo 'Tip-> source .env && echo "$GHCR_TOKEN" | docker login ghcr.io -u ejmiddle --password-stdin'

