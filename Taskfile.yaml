version: '3'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # Main Streamlit app
  main_run:
    desc: Run the main Streamlit app on port 8080
    cmds:
      - task: _streamlit_app
        vars:
          APP_ENTRYPOINT: apps/main.py
          APP_PORT: '8080'
    interactive: true

  main_docker_build:
    desc: Build the main Streamlit app image for GHCR
    cmds:
      - task: _docker_build_streamlit_app
        vars:
          APP_ENTRYPOINT: apps/main.py
          IMAGE: ghcr.io/ejmiddle/neckarwave-main

  main_docker_push:
    desc: Push the main Streamlit app image and build cache to GHCR
    cmds:
      - task: _docker_push_streamlit_app
        vars:
          IMAGE: ghcr.io/ejmiddle/neckarwave-main

  main_docker_publish:
    desc: Build then push the main Streamlit app image
    cmds:
      - task: main_docker_build
      - task: main_docker_push

  main_docker_run:
    desc: Run the main app container locally on port 8080 with live source mounts
    cmds:
      - task: main_docker_build
      - docker run --rm --platform linux/amd64 --env-file .env -e STREAMLIT_APP_FILE=apps/main.py -e STREAMLIT_SERVER_PORT=8080 -p 8080:8080 -v "$(pwd)/apps:/app/apps" -v "$(pwd)/data:/app/data" -v "$(pwd)/src:/app/src" -v "$(pwd)/pages:/app/pages" -v "$(pwd)/streamlit_app.py:/app/streamlit_app.py:ro" -v "$(pwd)/.streamlit:/app/.streamlit:ro" -v "$(pwd)/logging.conf:/app/logging.conf:ro" ghcr.io/ejmiddle/neckarwave-main:latest
    interactive: true

  # Accounting Streamlit app
  acc_run:
    desc: Run the accounting Streamlit app on port 8081
    cmds:
      - task: _streamlit_app
        vars:
          APP_ENTRYPOINT: apps/accounting.py
          APP_PORT: '8081'
    interactive: true

  acc_docker_build:
    desc: Build the accounting Streamlit app image for GHCR
    cmds:
      - task: _docker_build_streamlit_app
        vars:
          APP_ENTRYPOINT: apps/accounting.py
          IMAGE: ghcr.io/ejmiddle/neckarwave-accounting

  acc_docker_push:
    desc: Push the accounting Streamlit app image and build cache to GHCR
    cmds:
      - task: _docker_push_streamlit_app
        vars:
          IMAGE: ghcr.io/ejmiddle/neckarwave-accounting

  acc_docker_publish:
    desc: Build then push the accounting Streamlit app image
    cmds:
      - task: acc_docker_build
      - task: acc_docker_push

  acc_docker_run:
    desc: Run the accounting app container locally on port 8081 with live source mounts
    cmds:
      - task: acc_docker_build
      - docker run --rm --platform linux/amd64 --env-file .env -e STREAMLIT_APP_FILE=apps/accounting.py -e STREAMLIT_SERVER_PORT=8080 -p 8081:8080 -v "$(pwd)/apps:/app/apps" -v "$(pwd)/data:/app/data" -v "$(pwd)/src:/app/src" -v "$(pwd)/pages:/app/pages" -v "$(pwd)/streamlit_app.py:/app/streamlit_app.py:ro" -v "$(pwd)/.streamlit:/app/.streamlit:ro" -v "$(pwd)/logging.conf:/app/logging.conf:ro" ghcr.io/ejmiddle/neckarwave-accounting:latest
    interactive: true

  # Dev and utility tasks
  dev_install:
    desc: Install dependencies using uv
    cmds:
      - UV_CACHE_DIR=.uv-cache uv sync
    sources:
      - pyproject.toml
      - uv.lock

  _streamlit_app:
    internal: true
    deps: [dev_install]
    cmds:
      - sh -c 'if [ -f .env ]; then set -a; . ./.env; set +a; fi; UV_CACHE_DIR=.uv-cache uv run streamlit run {{.APP_ENTRYPOINT}} --server.port {{.APP_PORT}} --browser.serverPort {{.APP_PORT}}'

  dev_api_run:
    desc: Run FastAPI image API on port 8000
    deps: [dev_install]
    cmds:
      - set -a; source .env; set +a; UV_CACHE_DIR=.uv-cache uv run uvicorn fastapi_app:app --host 0.0.0.0 --port 8000
    interactive: true

  dev_api_dev:
    desc: Run FastAPI image API with auto-reload
    deps: [dev_install]
    cmds:
      - set -a; source .env; set +a; UV_CACHE_DIR=.uv-cache uv run uvicorn fastapi_app:app --host 0.0.0.0 --port 8000 --reload
    interactive: true

  dev_api_tls_cert:
    desc: Create local self-signed TLS cert for HTTPS API testing
    cmds:
      - mkdir -p certs
      - openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout certs/localhost-key.pem -out certs/localhost.pem -subj "/CN=localhost"

  dev_api_run_https:
    desc: Run FastAPI image API over HTTPS on port 8443
    deps: [dev_install]
    cmds:
      - set -a; source .env; set +a; UV_CACHE_DIR=.uv-cache uv run uvicorn fastapi_app:app --host 0.0.0.0 --port 8443 --ssl-keyfile certs/localhost-key.pem --ssl-certfile certs/localhost.pem
    interactive: true

  dev_api_dev_https:
    desc: Run FastAPI image API over HTTPS with auto-reload on port 8443
    deps: [dev_install]
    cmds:
      - set -a; source .env; set +a; UV_CACHE_DIR=.uv-cache uv run uvicorn fastapi_app:app --host 0.0.0.0 --port 8443 --reload --ssl-keyfile certs/localhost-key.pem --ssl-certfile certs/localhost.pem
    interactive: true

  dev_api_health:
    desc: Check local API health endpoint
    cmds:
      - curl -fsS http://localhost:8000/health

  dev_api_health_https:
    desc: Check local HTTPS API health endpoint
    cmds:
      - curl -k -fsS https://localhost:8443/health

  dev_containers_up:
    desc: Start backend container stack (qdrant + fastapi) for local integration
    cmds:
      - docker network inspect neckarwave_net >/dev/null 2>&1 || docker network create neckarwave_net
      - docker rm -f nw_qdrant >/dev/null 2>&1 || true
      - docker run --rm -d --name nw_qdrant --network neckarwave_net -p 6333:6333 -p 6334:6334 -v "$(pwd)/qdrant_storage:/qdrant/storage" qdrant/qdrant:latest
      - task dev_docker_build_fastapi_amd64
      - docker rm -f nw_fastapi >/dev/null 2>&1 || true
      - docker run --rm -d --name nw_fastapi --network neckarwave_net --env-file .env -e QDRANT_URL=http://nw_qdrant:6333 -p 8000:8000 ghcr.io/ejmiddle/fastapi-backend:latest

  dev_containers_down:
    desc: Stop backend container stack (qdrant + fastapi)
    cmds:
      - docker stop nw_fastapi >/dev/null 2>&1 || true
      - docker stop nw_qdrant >/dev/null 2>&1 || true

  dev_containers_ps:
    desc: Show running project containers
    cmds:
      - docker ps --filter "name=nw_fastapi" --filter "name=nw_qdrant"

  dev_containers_logs_fastapi:
    desc: Follow logs from FastAPI backend container
    cmds:
      - docker logs -f nw_fastapi

  dev_containers_logs_qdrant:
    desc: Follow logs from Qdrant backend container
    cmds:
      - docker logs -f nw_qdrant

  dev_ping_test_internet:
    desc: Run the internet ping test script
    deps: [dev_install]
    cmds:
      - UV_CACHE_DIR=.uv-cache uv run python scripts/ping_test_internet.py monitor

  dev_ping_test_internet_plot:
    desc: Plot results from the internet ping test logfile
    deps: [dev_install]
    cmds:
      - UV_CACHE_DIR=.uv-cache uv run python scripts/ping_test_internet.py plot

  dev_clean:
    desc: Clear local uv, Streamlit, and Python caches
    cmds:
      - rm -rf .uv-cache .streamlit/cache .pytest_cache .mypy_cache
      - find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true

  _docker_build_streamlit_app:
    internal: true
    cmds:
      - sh -c 'if [ "${DOCKER_BUILD_REGISTRY_CACHE:-0}" = "1" ]; then docker buildx build --platform linux/amd64 --pull --build-arg STREAMLIT_APP_FILE={{.APP_ENTRYPOINT}} --cache-from type=registry,ref={{.IMAGE}}:buildcache --cache-to type=registry,ref={{.IMAGE}}:buildcache,mode=max -t {{.IMAGE}}:latest --load -f Dockerfile .; else docker buildx build --platform linux/amd64 --pull --build-arg STREAMLIT_APP_FILE={{.APP_ENTRYPOINT}} -t {{.IMAGE}}:latest --load -f Dockerfile .; fi'
      - echo "docker images {{.IMAGE}}:latest"

  _docker_push_streamlit_app:
    internal: true
    cmds:
      - docker push {{.IMAGE}}:latest
      - sh -c 'if [ "${DOCKER_BUILD_REGISTRY_CACHE:-0}" = "1" ]; then docker push {{.IMAGE}}:buildcache; fi'
      - echo 'Tip-> source .env && echo "$GHCR_TOKEN" | docker login ghcr.io -u ejmiddle --password-stdin'

  dev_docker_build_fastapi_amd64:
    desc: Build amd64 FastAPI backend image
    cmds:
      - sh -c 'if [ "${DOCKER_BUILD_REGISTRY_CACHE:-0}" = "1" ]; then docker buildx build --platform linux/amd64 --cache-from type=registry,ref=ghcr.io/ejmiddle/fastapi-backend:buildcache --cache-to type=registry,ref=ghcr.io/ejmiddle/fastapi-backend:buildcache,mode=max -t ghcr.io/ejmiddle/fastapi-backend:latest --load -f Dockerfile.fastapi .; else docker buildx build --platform linux/amd64 -t ghcr.io/ejmiddle/fastapi-backend:latest --load -f Dockerfile.fastapi .; fi'

  dev_docker_push_fastapi:
    desc: Push FastAPI backend image and build cache to GHCR
    cmds:
      - docker push ghcr.io/ejmiddle/fastapi-backend:latest
      - sh -c 'if [ "${DOCKER_BUILD_REGISTRY_CACHE:-0}" = "1" ]; then docker push ghcr.io/ejmiddle/fastapi-backend:buildcache; fi'

  dev_docker_publish_fastapi:
    desc: Build then push FastAPI backend image to GHCR
    cmds:
      - task dev_docker_build_fastapi_amd64
      - task dev_docker_push_fastapi

  dev_api_run_publish:
    desc: Build then push image for api_run deployment
    cmds:
      - task dev_docker_publish_fastapi

  dev_docker_run_fastapi:
    desc: Run the FastAPI backend container locally for testing
    deps: [dev_docker_build_fastapi_amd64]
    cmds:
      - docker run --rm --platform linux/amd64 --env-file .env -p 8000:8000 ghcr.io/ejmiddle/fastapi-backend:latest
    interactive: true

  dev_qdrant_up:
    desc: Start a local Qdrant server (latest stable)
    cmds:
      - mkdir -p qdrant_storage
      - docker run --rm -d --name qdrant -p 6333:6333 -p 6334:6334 -v "$(pwd)/qdrant_storage:/qdrant/storage" qdrant/qdrant:latest

  dev_qdrant_down:
    desc: Stop the local Qdrant server
    cmds:
      - docker stop qdrant

  dev_qdrant_logs:
    desc: Follow logs from the local Qdrant server
    cmds:
      - docker logs -f qdrant

  dev_qdrant_test:
    desc: Test the local Qdrant server health endpoint
    cmds:
      - python3 scripts/test_qdrant.py

